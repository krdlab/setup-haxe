name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      # NOTE: '.github/*.yml' matches only files directly under .github/ (e.g. dependabot.yml).
      # Workflow files under .github/workflows/ intentionally trigger CI when edited.
      - ".github/*.yml"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - ".github/*.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Git Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci
      - run: npm run test
      - run: npm run dist

      - name: Verify committed dist is up to date
        run: git diff --exit-code -- dist

  build:
    needs: lint-and-unit
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        haxe:
          - latest
          - 4.3.7
          - 3.4.7
        include:
          - haxe: 3.4.7
            hxml_suffix: _haxe3
          - haxe: latest
            os: ubuntu-24.04-arm

    env:
      TEST_LIB_HXML: test-workflow/lib${{ matrix.hxml_suffix }}.hxml

    steps:
      - name: Git Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Haxe ${{ matrix.haxe }}
        uses: ./
        with:
          haxe-version: ${{ matrix.haxe }}

      - name: Re-install Haxe ${{ matrix.haxe }} (idempotency check)
        uses: ./
        with:
          haxe-version: ${{ matrix.haxe }}
          cache-dependency-path: ${{ env.TEST_LIB_HXML }}

      - name: "Working directory must stay clean after setup (issue #40)"
        run: |
          dirty="$(git status --porcelain)"
          if [ -n "$dirty" ]; then
            echo "::error::setup-haxe left files in the working directory (see issue #40):"
            echo "$dirty"
            exit 1
          fi
          echo "Working directory is clean after setup-haxe."

      - run: neko -version
      - run: haxe -version

      - run: haxelib install ${{ env.TEST_LIB_HXML }} --always

      - name: Compile test code
        run: |
          haxe \
            -cp test-workflow \
            -lib hxnodejs \
            -main Main \
            -js test-workflow.js
